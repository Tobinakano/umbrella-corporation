<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Umbrella Corporation</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'CSS/login.css' %}">
</head>
<body class="login-bg">
    <div class="login-container">
        <img src="{% static 'accounts/Images/umbrella_logo.png' %}" alt="Umbrella Logo" class="logo">
        <h2>Bienvenido a Umbrella Corporation</h2>
        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Usuario" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit">Ingresar</button>
        </form>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <p>¿No tienes cuenta? <a href="/accounts/register/">Regístrate</a></p>
    </div>
</body>
</html>
